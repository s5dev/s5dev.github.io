{{ define "main" }}
<h2 style="font-size: 22px; font-weight: 700; color: #000; margin-bottom: 24px;">
  {{ .Title }}
</h2>

{{ range .Pages }}
<div class="post-item">
  <div class="post-row">
    <a href="{{ .RelPermalink }}" class="post-title">{{ .Title }}</a>
    <span class="post-date">{{ .Date.Format "Jan 2, 2006" }}</span>
  </div>
  {{ with .Description }}
  <div class="post-desc">{{ . }}</div>
  {{ end }}
</div>
{{ end }}
{{ end }}
